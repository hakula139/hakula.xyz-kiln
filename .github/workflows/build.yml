name: Build site

on:
  workflow_call:
    inputs:
      upload-artifact:
        description: Upload public/ as a workflow artifact
        type: boolean
        default: false
      base-url:
        description: Override `base_url` from config.toml (used by PR previews so links stay on the preview origin)
        type: string
        default: ''

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: true
          lfs: true

      - name: Setup Nix
        uses: ./.github/actions/setup-nix
        with:
          cachix_name: hakula
          cachix_skip_push: 'true'

      - name: Install dependencies
        run: nix develop -c pnpm install --frozen-lockfile

      - name: Build CSS
        run: nix develop -c pnpm build

      - name: Build site
        env:
          KILN_BASE_URL: ${{ inputs.base-url }}
        run: nix develop -c kiln build --minify

      - name: Upload artifact
        if: ${{ inputs.upload-artifact }}
        uses: actions/upload-artifact@v4
        with:
          name: site-public
          path: public/
          retention-days: 7
          if-no-files-found: error
