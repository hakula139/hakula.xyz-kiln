name: Build site

on:
  workflow_call:
    inputs:
      upload-artifact:
        description: Upload public/ as a workflow artifact
        type: boolean
        default: false
      base-url:
        description: Override `base_url` from config.toml (used by PR previews so links stay on the preview origin)
        type: string
        default: ''

permissions:
  contents: read

env:
  KILN_VERSION: 0.2.0-rc.2

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: true
          lfs: true

      - name: Set up pnpm
        uses: pnpm/action-setup@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install libdav1d
        # Required by the `image` crate's `avif-native` decoder via dav1d-sys.
        run: sudo apt-get update && sudo apt-get install -y libdav1d-dev nasm

      - name: Install kiln
        run: |
          curl -fsSL "https://github.com/hakula139/kiln/releases/download/v${KILN_VERSION}/kiln-x86_64-unknown-linux-gnu.tar.gz" | tar -xz
          sudo mv kiln /usr/local/bin/
          kiln --version

      - name: Install Pagefind
        run: pnpm add -g pagefind

      - name: Build CSS
        run: pnpm build

      - name: Build site
        env:
          KILN_BASE_URL: ${{ inputs.base-url }}
        run: kiln build --minify

      - name: Upload artifact
        if: ${{ inputs.upload-artifact }}
        uses: actions/upload-artifact@v4
        with:
          name: site-public
          path: public/
          retention-days: 7
          if-no-files-found: error
