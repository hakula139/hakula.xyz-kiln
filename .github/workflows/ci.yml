name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  flake-check:
    name: Nix Flake Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Nix
        uses: ./.github/actions/setup-nix
        with:
          cachix_name: hakula
          cachix_skip_push: 'true'

      - name: Run flake check
        run: nix flake check --no-build

  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Setup Nix
        uses: ./.github/actions/setup-nix
        with:
          cachix_name: hakula
          cachix_skip_push: 'true'

      - name: Install dependencies
        run: nix develop -c pnpm install --frozen-lockfile

      - name: Build CSS
        run: nix develop -c pnpm build

      - name: Verify compiled CSS is up to date
        run: git diff --exit-code static/

      - name: Format
        run: nix develop -c pnpm format

      - name: Lint Markdown
        run: nix develop -c pnpm lint

      - name: Spell check
        run: nix develop -c pnpm spellcheck

  build:
    uses: ./.github/workflows/build.yml
