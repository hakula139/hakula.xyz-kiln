name: Preview deploy

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  build:
    uses: ./.github/workflows/build.yml
    with:
      upload-artifact: true
      base-url: https://pr-${{ github.event.pull_request.number }}-hakula-xyz-kiln.hakula.workers.dev

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    env:
      PR_NUMBER: ${{ github.event.pull_request.number }}
      PR_SHA: ${{ github.event.pull_request.head.sha }}
      WORKER_NAME: hakula-xyz-kiln
      WORKERS_DEV_SUBDOMAIN: hakula.workers.dev
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: pnpm

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: site-public
          path: public/

      - name: Upload preview version
        id: upload
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: '4.87.0'
          command: >-
            versions upload
            --preview-alias pr-${{ env.PR_NUMBER }}
            --message "PR #${{ env.PR_NUMBER }} @ ${{ env.PR_SHA }}"

      - name: Extract preview metadata
        id: meta
        env:
          UPLOAD_OUTPUT: ${{ steps.upload.outputs.command-output }}
        run: |
          version_id=$(awk '/Worker Version ID:/ {print $NF; exit}' <<<"$UPLOAD_OUTPUT")
          version_prefix="${version_id:0:8}"
          {
            echo "short_sha=${PR_SHA:0:7}"
            echo "version_url=https://${version_prefix}-${WORKER_NAME}.${WORKERS_DEV_SUBDOMAIN}"
            echo "alias_url=https://pr-${PR_NUMBER}-${WORKER_NAME}.${WORKERS_DEV_SUBDOMAIN}"
            echo "deploy_time=$(date -u +'%Y-%m-%d %H:%M UTC')"
          } >> "$GITHUB_OUTPUT"

      - name: Comment preview
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: preview-url
          message: |
            ## ⚡ Cloudflare Workers preview

            <table>
              <tr>
                <td><strong>Preview</strong></td>
                <td><a href="${{ steps.meta.outputs.version_url }}">${{ steps.meta.outputs.version_url }}</a></td>
              </tr>
              <tr>
                <td><strong>Branch preview</strong></td>
                <td><a href="${{ steps.meta.outputs.alias_url }}">${{ steps.meta.outputs.alias_url }}</a></td>
              </tr>
              <tr>
                <td><strong>Commit</strong></td>
                <td><code>${{ steps.meta.outputs.short_sha }}</code></td>
              </tr>
              <tr>
                <td><strong>Updated</strong></td>
                <td>${{ steps.meta.outputs.deploy_time }}</td>
              </tr>
            </table>

            [View deploy logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
