base_url = "https://dev.hakula.xyz"
title = "HAKULA†CHANNEL"
description = "Hakula's personal site"
language = "zh-Hans"
timezone = "Asia/Shanghai"
output_dir = "public"
theme = "IgnIt"

[search]
enabled = true

[author]
name = "Hakula"
email = "i@hakula.xyz"
link = "https://hakula.xyz"

[params]
fontawesome = true

[params.background]
image = "/images/bg.webp"
# Hand-rolled 16x8 LQIP since kiln only stamps `<img>`; CSS backgrounds need a manual placeholder.
lqip_uri = "data:image/webp;base64,UklGRk4AAABXRUJQVlA4IEIAAADwAQCdASoQAAgABIByJYwAAjuRI6+m6AAA/vGdTVlvPFRSsRiSc/Pgld5k7oUI2bfXkLCKpotCEX2jctQ+PaCoAAA="
position = "70% 50%"

[params.comments]
enabled = true
provider = "twikoo"

[params.comments.twikoo]
api_url = "https://twikoo.hakula.xyz"

[params.footer]
since = 2018
license = "CC BY-NC-SA 4.0"
license_url = "https://creativecommons.org/licenses/by-nc-sa/4.0/"

[params.home]
paginate = 8

[params.home.profile]
avatar = "/images/hotlink-ok/avatar-lite.webp"
title = "HAKULA†CHANNEL"
subtitle = "让我们一直谈论变革，以确保事实上什么都没改变。"

[params.lightgallery]
enabled = true
# Public client-side key; the theme emits it as a <meta> tag and lightgallery
# reads it from the DOM. Safe to commit.
license_key = "25262F0A-212A4039-AF8FA4BC-CA4E44AD"

[params.section]
paginate = 10

# `name` fields are i18n keys resolved by the theme via `t(item.name)`.
# Labels live in `i18n/<language>.toml`.
