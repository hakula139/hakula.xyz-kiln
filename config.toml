base_url = "https://dev.hakula.xyz"
title = "HAKULA†CHANNEL"
description = "Hakula's personal site"
language = "zh-Hans"
timezone = "Asia/Shanghai"
output_dir = "public"
theme = "IgnIt"

[search]
enabled = true

[author]
name = "Hakula"
email = "i@hakula.xyz"
link = "https://hakula.xyz"

[params]
fontawesome = true

[params.background]
image = "/images/bg.webp"
position = "70% 50%"

[params.home]
paginate = 8

[params.home.profile]
avatar = "/images/hotlink-ok/avatar-lite.webp"
title = "HAKULA†CHANNEL"
subtitle = "让我们一直谈论变革，以确保事实上什么都没改变。"

[params.section]
paginate = 10

[params.footer]
since = 2018
license = "CC BY-NC-SA 4.0"
license_url = "https://creativecommons.org/licenses/by-nc-sa/4.0/"

